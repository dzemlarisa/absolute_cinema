services:
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=cinema_user
      - POSTGRES_PASSWORD=12345
      - POSTGRES_DB=cinema
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema_user -d cinema"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend/app:/app
    environment:
      - DATABASE_URL=postgresql://cinema_user:12345@db:5432/cinema
      #- PYTHONPATH=/app
    networks:
      - app-network
    depends_on: 
      #- db
      db:
        condition: service_healthy
    command: >
      sh -c "
        python seed.py &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
        
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: